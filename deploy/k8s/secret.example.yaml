# ⚠️ 此文件是模板。实际部署时：
#   1) 复制为 secret.yaml（已被 .gitignore 应再次 ignore；千万别 git add）
#   2) 把所有 REPLACE_ME 替换为真实值
#   3) kubectl apply -f secret.yaml
#
# 或用 kubectl create 命令式生成：
#   kubectl create secret generic claude-lb-secrets \
#     --from-literal=LB_API_KEY=sk-xxx \
#     --from-literal=DATABRICKS_TOKEN_CENTRALUS=dapi_xxx \
#     ... \
#     -n <namespace>
#   kubectl create secret generic claude-lb-copilot-cache \
#     --from-file=copilot-auth-gh-account-1.json=$HOME/.config/databricks-claude-lb/copilot-auth-gh-account-1.json \
#     -n <namespace>

---
apiVersion: v1
kind: Secret
metadata:
  name: claude-lb-secrets
  labels:
    app: claude-lb
type: Opaque
stringData:
  # 客户端调用本服务时使用的 API key
  LB_API_KEY: REPLACE_ME

  # Databricks tokens（每个 workspace 一个）
  DATABRICKS_TOKEN_CENTRALUS: REPLACE_ME
  DATABRICKS_TOKEN_EASTUS: REPLACE_ME
  DATABRICKS_TOKEN_EASTUS2: REPLACE_ME
  DATABRICKS_TOKEN_NORTHCENTRALUS: REPLACE_ME
  DATABRICKS_TOKEN_SOUTHCENTRALUS: REPLACE_ME
  DATABRICKS_TOKEN_WESTUS: REPLACE_ME

  # Azure OpenAI keys
  AZURE_KEY_EASTUS2: REPLACE_ME
  AZURE_KEY_SWEDENCENTRAL: REPLACE_ME
  AZURE_KEY_POLANDCENTRAL: REPLACE_ME
  AZURE_KEY_SOUTHCENTRALUS: REPLACE_ME

  # 备用：如果 ConfigMap 里改用 env 方式注入 GitHub token，把下行解开并填值
  # GITHUB_COPILOT_TOKEN_1: REPLACE_ME

---
# Copilot long-lived OAuth token 缓存文件，挂载到 /home/app/.config/databricks-claude-lb/
#
# 生成方式（在你本地一次性跑）：
#   python main.py --copilot-login --endpoint gh-account-1
#   # 然后会得到 ~/.config/databricks-claude-lb/copilot-auth-gh-account-1.json
#
# 把内容复制到这里（注意保留 stringData 字段名一致）；或用命令式：
#   kubectl create secret generic claude-lb-copilot-cache \
#     --from-file=copilot-auth-gh-account-1.json=$HOME/.config/databricks-claude-lb/copilot-auth-gh-account-1.json
#
# Token rotation 流程（无需重启 Pod）：
#   1) 本地重新跑 --copilot-login 拿新 token
#   2) kubectl create secret generic claude-lb-copilot-cache --from-file=... --dry-run=client -o yaml | kubectl apply -f -
#   3) 等 ≤1 min（kubelet 同步周期）或调 POST /admin/copilot/reload 立刻生效
apiVersion: v1
kind: Secret
metadata:
  name: claude-lb-copilot-cache
  labels:
    app: claude-lb
type: Opaque
stringData:
  copilot-auth-gh-account-1.json: |
    {"github_token":"REPLACE_ME","saved_at":0}
